<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>WeChat | Theeranan Jaikham</title>
  <meta name="description" content="Scan to connect with Theeranan Jaikham on WeChat." />

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #000000;
      color: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      background: #000000;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .wechat-image {
      display: block;
      width: 100%;
      max-width: 560px;
      height: auto;
      margin: 0 auto;
    }

    .backup-text {
      max-width: 560px;
      margin: 0 auto;
      padding: 18px 24px 36px;
      text-align: center;
      font-size: 14px;
      line-height: 1.65;
      color: #cccccc;
      background: #000000;
    }

    .backup-text strong {
      color: #ffffff;
      font-size: 15px;
    }
  </style>
</head>

<body>
  <main>
    <div class="page">
      <img
        src="../theeranan-wechat.png"
        alt="WeChat QR Code for Theeranan Jaikham"
        class="wechat-image"
      />
    </div>

    <div class="backup-text">
      <strong>WeChat | Theeranan Jaikham</strong><br />
      请使用微信扫描二维码添加我们。<br />
      如使用手机浏览，请截图后打开微信扫一扫，从相册识别二维码。
    </div>
  </main>
</body>
</html>
